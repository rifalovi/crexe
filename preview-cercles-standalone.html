<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apercu — Cercles d'impact CREXE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #FAF7F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.card { background: white; border-radius: 16px; padding: 2rem 2.5rem 2.5rem; box-shadow: 0 2px 24px rgba(0,0,0,.08); max-width: 1020px; width: 100%; }
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; color: #003da5; opacity: .65; margin-bottom: 4px; }
.section-title { font-family: 'Source Serif 4', Georgia, serif; font-size: 26px; font-weight: 700; color: #042C53; margin-bottom: 1.75rem; }
</style>
</head>
<body>
<div class="card">
  <p class="section-label">Portee de l'impact</p>
  <h2 class="section-title">Les cercles d'impact</h2>

  <svg viewBox="0 0 980 575" style="width:100%;height:auto;display:block" role="img">

    <!-- ANNEAUX — Centre : (490, 288) -->
    <circle cx="490" cy="288" r="222" fill="none" stroke="rgba(0,61,165,.05)" stroke-width="2" stroke-dasharray="5 4"/>
    <circle cx="490" cy="288" r="205" fill="rgba(0,61,165,.05)" stroke="rgba(0,61,165,.22)" stroke-width="1.2"/>
    <circle cx="490" cy="288" r="160" fill="rgba(0,61,165,.08)" stroke="rgba(0,61,165,.3)" stroke-width="1.2"/>
    <circle cx="490" cy="288" r="115" fill="rgba(107,44,145,.09)" stroke="rgba(107,44,145,.32)" stroke-width="1.2"/>
    <circle cx="490" cy="288" r="70" fill="rgba(107,44,145,.18)" stroke="rgba(107,44,145,.5)" stroke-width="1.5"/>
    <circle cx="490" cy="288" r="40" fill="#D4A017" stroke="#92620A" stroke-width="2"/>

    <!-- NUMEROS dans les anneaux -->
    <!-- 4 : milieu R4(205)-R3(160)=182, en haut : y=288-182=106 -->
    <text x="490" y="106" text-anchor="middle" dominant-baseline="central" fill="rgba(0,61,165,.42)" font-size="17" font-weight="700" font-family="Arial,sans-serif">4</text>
    <!-- 3 : milieu R3(160)-R2(115)=137, en bas : y=288+137=425 -->
    <text x="490" y="425" text-anchor="middle" dominant-baseline="central" fill="rgba(0,61,165,.5)" font-size="17" font-weight="700" font-family="Arial,sans-serif">3</text>
    <!-- 2 : milieu R2(115)-R1(70)=92, a gauche : x=490-92=398 -->
    <text x="398" y="288" text-anchor="middle" dominant-baseline="central" fill="rgba(107,44,145,.62)" font-size="17" font-weight="700" font-family="Arial,sans-serif">2</text>
    <!-- 1 : milieu R1(70)-RC(40)=55, a droite : x=490+55=545 -->
    <text x="545" y="288" text-anchor="middle" dominant-baseline="central" fill="rgba(107,44,145,.8)" font-size="17" font-weight="700" font-family="Arial,sans-serif">1</text>

    <!-- COEUR central -->
    <text x="490" y="282" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12" font-weight="800" font-family="Arial,sans-serif">4,3 M€</text>
    <text x="490" y="297" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,.78)" font-size="6.5" font-family="Arial,sans-serif">Investissement</text>

    <!-- CONNECTEURS pointilles avec point de jonction -->
    <!-- N4 haut: ring top (490,83) vers label bas (490,68) -->
    <line x1="490" y1="83" x2="490" y2="68" stroke="rgba(0,61,165,.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="490" cy="83" r="3.5" fill="rgba(0,61,165,.4)"/>

    <!-- N3 gauche: ring left (330,288) vers label droite (277,288) -->
    <line x1="330" y1="288" x2="277" y2="288" stroke="rgba(0,61,165,.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="330" cy="288" r="3.5" fill="rgba(0,61,165,.4)"/>

    <!-- N1 droite: ring right (560,288) vers label gauche (618,288) -->
    <line x1="560" y1="288" x2="618" y2="288" stroke="rgba(107,44,145,.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="560" cy="288" r="3.5" fill="rgba(107,44,145,.45)"/>

    <!-- N2 bas: ring bottom (490,403) vers label haut (490,416) -->
    <line x1="490" y1="403" x2="490" y2="416" stroke="rgba(0,61,165,.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="490" cy="403" r="3.5" fill="rgba(0,61,165,.4)"/>

    <!-- ========== LABEL BOX N4 — HAUT CENTRE ========== -->
    <rect x="365" y="8" width="250" height="58" rx="8" fill="rgba(0,61,165,.055)" stroke="rgba(0,61,165,.28)" stroke-width="1"/>
    <rect x="365" y="8" width="250" height="3.5" rx="2" fill="#003da5" opacity=".6"/>
    <text x="380" y="27" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="rgba(0,61,165,.5)" letter-spacing="1.2">NIVEAU 4</text>
    <rect x="525" y="18" width="82" height="13" rx="6.5" fill="rgba(91,33,182,.12)"/>
    <text x="531" y="27.5" font-family="Inter,sans-serif" font-size="8" fill="#5b21b6">&#9679; Institutionnel</text>
    <text x="380" y="45" font-family="Inter,sans-serif" font-size="13.5" font-weight="700" fill="#003da5">Espace francophone</text>
    <text x="380" y="60" font-family="Inter,sans-serif" font-size="10" fill="#9ca3af">Appel de Kigali · 31 pays · ODD 5</text>

    <!-- ========== LABEL BOX N3 — GAUCHE ========== -->
    <rect x="8" y="234" width="268" height="110" rx="8" fill="rgba(0,61,165,.055)" stroke="rgba(0,61,165,.25)" stroke-width="1"/>
    <rect x="8" y="234" width="3.5" height="110" rx="2" fill="#003da5" opacity=".55"/>
    <text x="24" y="254" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="rgba(0,61,165,.5)" letter-spacing="1.2">NIVEAU 3</text>
    <rect x="92" y="244" width="52" height="13" rx="6.5" fill="rgba(30,64,175,.12)"/>
    <text x="97" y="253.5" font-family="Inter,sans-serif" font-size="8" fill="#1e40af">&#9679; Observe</text>
    <text x="24" y="275" font-family="Inter,sans-serif" font-size="13.5" font-weight="700" fill="#003da5">Communautes mobilisees</text>
    <text x="24" y="295" font-family="Inter,sans-serif" font-size="10.5" fill="#9ca3af">Collectivites, cooperatives,</text>
    <text x="24" y="311" font-family="Inter,sans-serif" font-size="10.5" fill="#9ca3af">reduction documentee des violences</text>
    <text x="24" y="328" font-family="Inter,sans-serif" font-size="9.5" fill="rgba(0,61,165,.45)" font-style="italic">Missions terrain · OIF 2025</text>

    <!-- ========== LABEL BOX N1 — DROITE ========== -->
    <rect x="618" y="178" width="358" height="218" rx="10" fill="#f3edf7" stroke="rgba(107,44,145,.3)" stroke-width="1.2"/>
    <rect x="618" y="178" width="4" height="218" rx="2" fill="#6b2c91" opacity=".75"/>
    <text x="636" y="200" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="rgba(107,44,145,.55)" letter-spacing="1.2">NIVEAU 1</text>
    <rect x="712" y="190" width="50" height="13" rx="6.5" fill="rgba(22,101,52,.12)"/>
    <text x="718" y="199.5" font-family="Inter,sans-serif" font-size="8" fill="#166534">&#9679; Mesure</text>
    <text x="636" y="244" font-family="'Source Serif 4',Georgia,serif" font-size="28" font-weight="700" fill="#6b2c91">9 475 femmes</text>
    <text x="636" y="270" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#042C53">Beneficiaires directes</text>
    <text x="636" y="292" font-family="Inter,sans-serif" font-size="11" fill="#9ca3af">Revenus multiplies par 3 en moyenne</text>
    <line x1="636" y1="308" x2="968" y2="308" stroke="rgba(107,44,145,.12)" stroke-width="1"/>
    <text x="636" y="328" font-family="Inter,sans-serif" font-size="10" fill="rgba(107,44,145,.6)">87,4% tres satisfaites</text>
    <text x="636" y="354" font-family="'Source Serif 4',Georgia,serif" font-size="22" font-weight="700" fill="#6b2c91">x 3 revenus</text>
    <text x="636" y="378" font-family="Inter,sans-serif" font-size="9" fill="rgba(107,44,145,.4)" font-style="italic">Rapport P14 OIF 2025</text>

    <!-- ========== LABEL BOX N2 — BAS CENTRE ========== -->
    <rect x="328" y="416" width="324" height="150" rx="8" fill="#f0f4fa" stroke="rgba(0,61,165,.22)" stroke-width="1"/>
    <rect x="328" y="416" width="324" height="3.5" rx="2" fill="#003da5" opacity=".55"/>
    <text x="346" y="436" font-family="Inter,sans-serif" font-size="8.5" font-weight="700" fill="rgba(0,61,165,.5)" letter-spacing="1.2">NIVEAU 2</text>
    <rect x="424" y="426" width="44" height="13" rx="6.5" fill="rgba(133,77,14,.12)"/>
    <text x="429" y="435.5" font-family="Inter,sans-serif" font-size="8" fill="#854d0e">&#9679; Estime</text>
    <text x="346" y="473" font-family="'Source Serif 4',Georgia,serif" font-size="26" font-weight="700" fill="#003da5">&#8776; 47 000 personnes</text>
    <text x="346" y="496" font-family="Inter,sans-serif" font-size="13.5" font-weight="700" fill="#042C53">Familles transformees</text>
    <text x="346" y="515" font-family="Inter,sans-serif" font-size="10.5" fill="#9ca3af">Scolarisation, sante, alimentation</text>
    <text x="346" y="533" font-family="Inter,sans-serif" font-size="9" fill="rgba(0,61,165,.45)" font-style="italic">Hyp.: 5 personnes par foyer · Estimation CREXE</text>
    <text x="346" y="551" font-family="Inter,sans-serif" font-size="9" fill="rgba(0,61,165,.35)" font-style="italic">Rapport P14 OIF 2025</text>

  </svg>
</div>
</body>
</html>
